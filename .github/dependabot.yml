# dependabot.yml — drop into .github/dependabot.yml
#
# Scoped to this repo's actual manifests only. Dependabot's own update job
# hard-errors (not a silent skip) for an ecosystem with no matching manifest
# ("/action.yml or /.github/workflows/<anything>.yml not found", etc.) --
# confirmed 2026-07-18 as a real, pre-existing fleet-wide gap (the-grind, a
# pure Markdown repo with zero code manifests, had been failing 5/6
# ecosystems every week since before this session). The generic template
# blanket-included pip+npm+nuget+gomod+docker+github-actions regardless of
# actual stack -- trimmed to only what this repo really has.

version: 2
updates:
  # Node (package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "node"]
    commit-message:
      prefix: "chore(deps)"

  # Docker base images (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions versions (workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
