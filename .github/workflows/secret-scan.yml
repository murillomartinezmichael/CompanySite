# =============================================================================
# .github/workflows/secret-scan.yml — gitleaks secret scanning
#
# Drop this into any project's .github/workflows/ directory. Fails the build
# if gitleaks detects a leaked credential (AWS key, Anthropic key, GitHub
# token, private RSA key, high-entropy string, etc.).
#
# Runs on:
#   - Every push (scans the new commits, not the whole history each time)
#   - Every PR (scans the diff)
#
# Ignore false positives via .gitleaks.toml at project root — see
# docs/SECURITY_STANDARDS.md § Secret scanning for the rule format.
# =============================================================================

name: secret-scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel any in-flight run when a new commit arrives on the same ref.
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action calls GET /repos/.../pulls/{n}/commits on
      # pull_request events to scope its diff scan. Without this, every
      # PR-triggered run 403s ("Resource not accessible by integration",
      # x-accepted-github-permissions: pull_requests=read) -- push-triggered
      # runs are unaffected since they scan local git history directly.
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan against prior commits on push.
          # For PR runs, GITHUB_HEAD_REF vs GITHUB_BASE_REF is the diff.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail loudly when a leak is detected — no silent warnings.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          # If you have a paid gitleaks license, drop the key here to unlock
          # SARIF output + PR comments. Free tier still gates the build.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
