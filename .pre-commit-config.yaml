# .pre-commit-config.yaml — runs locally on every commit.
# Drop into repo root, then `pre-commit install` once per clone.
# https://pre-commit.com

repos:
  # Universal hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Secret detection — fail the commit if a secret pattern is detected
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Python — ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # JS / TS / Markdown — prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]

  # .NET — uncomment if you use dotnet format
  # - repo: local
  #   hooks:
  #     - id: dotnet-format
  #       name: dotnet format
  #       entry: dotnet format --verify-no-changes
  #       language: system
  #       pass_filenames: false
  #       types: [c#]

  # Standards enforcement — decoupling + security scanners live at the meta-repo
  # root (../scripts/). If a project vendors its own copy in `scripts/`, the
  # local block below runs against it. Otherwise these hooks skip silently.
  #
  # Each hook enforces one repo-wide standard doc:
  #   check-decoupling.py → docs/DECOUPLING_STANDARDS.md
  #   check-security.py   → docs/audits/SECURITY_AUDIT.md § 7
  - repo: local
    hooks:
      - id: check-decoupling
        name: check-decoupling — no cross-project imports
        entry: python scripts/check-decoupling.py .
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # If the project doesn't vendor the scanner, skip cleanly.
        files: ^scripts/check-decoupling\.py$|.*
        exclude: ^scripts/check-decoupling\.py$
        require_serial: true

      - id: check-security
        name: check-security — enforce SECURITY_AUDIT.md patterns
        entry: python scripts/check-security.py .
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^scripts/check-security\.py$|.*
        exclude: ^scripts/check-security\.py$
        require_serial: true

      # verify-standards — full self-audit against ENGINEERING_STANDARDS.md
      # sections 4 + 6. Runs the same checks CI enforces via
      # .github/workflows/verify.yml, so a commit that would fail CI
      # fails locally first.
      #
      # Resolution: ../scripts/verify-standards.sh (meta-repo sibling) or
      # scripts/verify-standards.sh (vendored). Skips if neither exists.
      # Set VERIFY_STANDARDS_ARGS='--library' for library projects.
      - id: verify-standards
        name: verify-standards — self-audit against ENGINEERING_STANDARDS.md
        entry: bash -c 'if [ -x ../scripts/verify-standards.sh ]; then ../scripts/verify-standards.sh ${VERIFY_STANDARDS_ARGS:-}; elif [ -x scripts/verify-standards.sh ]; then scripts/verify-standards.sh ${VERIFY_STANDARDS_ARGS:-}; else echo "verify-standards.sh not found — skipping"; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
        require_serial: true
