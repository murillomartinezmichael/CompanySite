server {
    listen NGINX_PORT;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml image/jpeg image/png;
    gzip_min_length 1024;

    # SECURITY_AUDIT.md § M3-M6 — defense-in-depth headers for the static site.
    # nginx `add_header` inheritance resets whenever a nested location declares
    # any add_header of its own — so the 5 security headers must be repeated in
    # `location = /index.html` below, or they drop off the /index.html response.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    location = /index.html {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    # Long-cache Astro's hashed asset bundle
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
